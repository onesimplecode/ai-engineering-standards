name: Release check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Public release validation (TR-PUB-002/003)
        run: python3 scripts/public-export-check.py .

      - name: Compile Python scripts
        run: python3 -m py_compile scripts/*.py

      - name: Install test dependencies
        run: python3 -m pip install pytest

      - name: Unit tests
        run: python3 -m pytest tests/test_public_standards_release.py -q
